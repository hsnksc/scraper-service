version: "3.9"

services:
  scraper:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: scraper:latest
    container_name: scraper
    restart: unless-stopped
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - loca_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  loca_network:
    external: true
